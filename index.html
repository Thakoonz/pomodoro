<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍅 Pomodoro Timer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fff0f8 0%, #fce7f3 50%, #ede9fe 100%);
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: #fff;
      border-radius: 32px;
      padding: 2.5rem 2rem 2.5rem;
      width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      box-shadow: 0 8px 40px #f9a8d440;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #be185d;
      letter-spacing: 0.5px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      background: #fde8f0;
      border-radius: 40px;
      padding: 5px;
    }

    .tab {
      border: none;
      background: transparent;
      border-radius: 32px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #b05580;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .tab.active { background: #f472b6; color: #fff; }

    .ring-wrap {
      position: relative;
      width: 220px;
      height: 220px;
    }

    .ring-wrap svg {
      position: absolute;
      top: 0; left: 0;
      transform: rotate(-90deg);
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .time-text {
      font-size: 44px;
      font-weight: 600;
      color: #be185d;
      letter-spacing: -1px;
    }

    .mode-label {
      font-size: 12px;
      color: #f9a8d4;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .deco {
      font-size: 22px;
      position: absolute;
      pointer-events: none;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn-main {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: none;
      background: #f472b6;
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.2s;
      box-shadow: 0 4px 16px #f9a8d460;
    }

    .btn-main:hover { background: #ec4899; }
    .btn-main:active { transform: scale(0.94); }

    .btn-sm {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      border: none;
      background: #fde8f0;
      color: #be185d;
      font-size: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.2s;
    }

    .btn-sm:hover { background: #fbcfe8; }
    .btn-sm:active { transform: scale(0.94); }

    .rounds {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #fce7f3;
      border: 1.5px solid #f9a8d4;
      transition: background 0.3s;
    }

    .dot.done { background: #f472b6; border-color: #f472b6; }

    .round-label {
      font-size: 13px;
      color: #f9a8d4;
      margin-left: 4px;
    }

    .msg {
      font-size: 14px;
      color: #db2777;
      min-height: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>🍅 Pomodoro Timer</h1>

    <div class="tabs">
      <button class="tab active" onclick="setMode('focus')">🍅 โฟกัส</button>
      <button class="tab" onclick="setMode('short')">☕ พักสั้น</button>
      <button class="tab" onclick="setMode('long')">🌿 พักยาว</button>
    </div>

    <div class="ring-wrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle cx="110" cy="110" r="96" fill="none" stroke="#fde8f0" stroke-width="10"/>
        <circle id="progress-ring" cx="110" cy="110" r="96" fill="none"
          stroke="#f472b6" stroke-width="10"
          stroke-linecap="round"
          stroke-dasharray="603.2"
          stroke-dashoffset="0"
          style="transition: stroke-dashoffset 1s linear, stroke 0.4s;"/>
      </svg>
      <div class="ring-center">
        <div class="time-text" id="display">25:00</div>
        <div class="mode-label" id="mode-name">โฟกัส</div>
      </div>
      <span class="deco" style="top:-4px; right:20px">🌸</span>
      <span class="deco" style="bottom:4px; left:16px">🌼</span>
      <span class="deco" style="top:50%; right:-12px; transform:translateY(-50%)">⭐</span>
    </div>

    <div class="controls">
      <button class="btn-sm" onclick="resetTimer()" title="รีเซ็ต">
        <i class="ti ti-refresh"></i>
      </button>
      <button class="btn-main" id="play-btn" onclick="toggleTimer()">
        <i class="ti ti-player-play" id="play-icon"></i>
      </button>
      <button class="btn-sm" onclick="skipSession()" title="ข้าม">
        <i class="ti ti-player-skip-forward"></i>
      </button>
    </div>

    <div class="rounds" id="rounds-wrap">
      <div class="dot done" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
      <span class="round-label" id="round-text">รอบที่ 1/4</span>
    </div>

    <div class="msg" id="msg">✨ พร้อมแล้ว มาเริ่มกันเลย!</div>
  </div>

  <script>
    const MODES = {
      focus: { sec: 25 * 60, label: 'โฟกัส',  color: '#f472b6', msg: '✨ พร้อมแล้ว มาเริ่มกันเลย!' },
      short: { sec: 5  * 60, label: 'พักสั้น', color: '#a78bfa', msg: '☕ พักสักครู่นะ~' },
      long:  { sec: 15 * 60, label: 'พักยาว',  color: '#34d399', msg: '🌿 พักผ่อนยาวๆ เลย!' }
    };

    let currentMode = 'focus';
    let totalSec    = MODES.focus.sec;
    let remaining   = totalSec;
    let running     = false;
    let interval    = null;
    let pomRound    = 0;
    const CIRC      = 2 * Math.PI * 96;

    function pad(n) { return String(n).padStart(2, '0'); }

    function updateDisplay() {
      const m = Math.floor(remaining / 60);
      const s = remaining % 60;
      document.getElementById('display').textContent = pad(m) + ':' + pad(s);
      document.title = pad(m) + ':' + pad(s) + ' 🍅 Pomodoro';
    }

    function updateRing(frac) {
      document.getElementById('progress-ring').style.strokeDashoffset = CIRC * (1 - frac);
    }

    function setMode(m) {
      if (running) toggleTimer();
      currentMode = m;
      totalSec    = MODES[m].sec;
      remaining   = totalSec;
      updateDisplay();
      updateRing(1);
      document.getElementById('msg').textContent       = MODES[m].msg;
      document.getElementById('mode-name').textContent = MODES[m].label;
      document.getElementById('progress-ring').style.stroke = MODES[m].color;
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['focus','short','long'][i] === m);
      });
      document.getElementById('play-icon').className = 'ti ti-player-play';
    }

    function toggleTimer() {
      if (running) {
        clearInterval(interval);
        running = false;
        document.getElementById('play-icon').className = 'ti ti-player-play';
        document.getElementById('msg').textContent = '⏸ หยุดชั่วคราว';
      } else {
        running = true;
        document.getElementById('play-icon').className = 'ti ti-player-pause';
        document.getElementById('msg').textContent = currentMode === 'focus'
          ? '🍅 กำลังโฟกัส...' : '😌 กำลังพัก...';
        interval = setInterval(() => {
          remaining--;
          updateDisplay();
          updateRing(remaining / totalSec);
          if (remaining <= 0) {
            clearInterval(interval);
            running = false;
            onSessionEnd();
          }
        }, 1000);
      }
    }

    function onSessionEnd() {
      document.getElementById('play-icon').className = 'ti ti-player-play';
      if (Notification.permission === 'granted') {
        new Notification('🍅 Pomodoro', {
          body: currentMode === 'focus' ? 'หมดเวลาโฟกัส! ได้เวลาพักแล้ว 🎉' : 'หมดเวลาพัก! กลับมาโฟกัสกันเลย 💪'
        });
      }
      if (currentMode === 'focus') {
        pomRound = Math.min(pomRound + 1, 4);
        updateDots();
        document.getElementById('msg').textContent = pomRound >= 4
          ? '🎉 ครบ 4 รอบแล้ว! พักยาวได้เลย~'
          : '🎉 เก่งมาก! ได้เวลาพักแล้ว';
      } else {
        document.getElementById('msg').textContent = '🍅 พร้อมโฟกัสรอบใหม่!';
      }
    }

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById('d' + i).classList.toggle('done', i < pomRound);
      }
      document.getElementById('round-text').textContent = 'รอบที่ ' + pomRound + '/4';
    }

    function resetTimer() {
      if (running) { clearInterval(interval); running = false; }
      remaining = totalSec;
      updateDisplay();
      updateRing(1);
      document.getElementById('play-icon').className = 'ti ti-player-play';
      document.getElementById('msg').textContent = MODES[currentMode].msg;
    }

    function skipSession() {
      if (running) { clearInterval(interval); running = false; }
      onSessionEnd();
      remaining = MODES[currentMode].sec;
      updateDisplay();
      updateRing(1);
      document.getElementById('play-icon').className = 'ti ti-player-play';
    }

    if (Notification.permission === 'default') Notification.requestPermission();
  </script>
</body>
</html>
